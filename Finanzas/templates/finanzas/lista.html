{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3" style="color: #2c5234; font-weight: 600;">Gestión de Finanzas</h2>
    <button class="btn btn-primary shadow"><i class="bi bi-plus-circle me-2"></i>Registrar Pago</button>
</div>

<div class="card p-4">
    <div class="table-responsive">
        <table class="table table-hover">
            <thead style="background-color: #2c5234; color: white;">
                <tr>
                    <th>Folio</th>
                    <th>Concepto</th>
                    <th>Monto</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody>
                {% for pago in pagos %}
                <tr>
                    <td class="fw-bold">{{ pago.idpago }}</td>
                    <td>{{ pago.concepto_idconcepto }}</td>
                    <td class="text-success fw-bold">${{ pago.monto }}</td>
                    <td>{{ pago.fecha_pago }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center">No hay pagos registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
