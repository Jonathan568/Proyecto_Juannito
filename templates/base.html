<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema UAEM | Gestión Universitaria</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --verde-uaem: #2c5234;
            --dorado-uaem: #b3a05c;
        }

        body {
            background-color: #f4f6f9;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
        }


        .sidebar {
            background-color: var(--verde-uaem);
            min-height: 100vh;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            padding-top: 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        .sidebar h4 {
            color: var(--dorado-uaem);
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid rgba(179, 160, 92, 0.3);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            margin: 5px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: rgba(179, 160, 92, 0.2);
            color: white;
            transform: translateX(5px);
        }

        /* Contenido Principal */
        .main-content {
            margin-left: 16.666667%;
            /* col-lg-2 */
            padding: 20px;
            width: 83.333333%;
        }

        .navbar {
            background-color: white;
            border-bottom: 3px solid var(--dorado-uaem);
            margin-bottom: 30px;
            padding: 10px 20px;
        }

        .navbar-brand {
            color: var(--verde-uaem);
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                min-height: auto;
                width: 100%;
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 sidebar d-none d-md-block">
                <h4>UAEM</h4>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_alumnos' %}">
                            <i class="bi bi-person-badge me-2"></i> Alumnos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_pagos' %}">
                            <i class="bi bi-cash-stack me-2"></i> Finanzas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_libros' %}">
                            <i class="bi bi-book me-2"></i> Biblioteca
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_periodos' %}">
                            <i class="bi bi-calendar-event me-2"></i> Escolar
                        </a>
                    </li>
                </ul>
            </nav>


            <main class="main-content">

                <nav class="navbar navbar-expand-lg shadow-sm rounded d-flex justify-content-between">
                    <span class="navbar-brand mb-0 h1">Panel Universitario</span>

                    <div class="d-flex align-items-center">
                        <span class="me-2 text-muted small">Hola, <strong>{{ user.username }}</strong></span>
                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-sm btn-outline-danger ms-2">
                                <i class="bi bi-box-arrow-right"></i> Salir
                            </button>
                        </form>
                    </div>
                </nav>


                <div class="container-fluid">
                    {% block content %}
                    {% endblock %}
                </div>
            </main>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
